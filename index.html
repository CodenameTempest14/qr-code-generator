<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator</title>

  <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;       
        height: 100vh;
        background-color: rgb(240, 234, 234);
      }

      .container {
        background-color: white;
        max-height: 600px;
        height: 500px;
        width: 400px;
        display: flex;
        box-shadow: 0px 4px 20px rgba(0,0,0,0.05);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
      }

      input {
        max-width: 300px;
        max-height: 30px;
        height: 20px;
        width: 250px;
      }

      .container button {
        all: unset;
        background-color: #3498db;
        color: white;
        padding: 12px 24px;
        font-size: 15px;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s ease, transform 0.2s ease;
      }

      .container button:hover {
        background-color: #2980b9;
        transform: scale(1.05);
      }
      
      .container img {
        height: 200px;
        width: 200px;
        object-fit: cover;
      }

      h1 {
        color: #3498db;
      }


  </style>
</head>
<body>
    <div class="container">
      <h1>QR Code Generator</h1>
      <input type="text" id="qr" placeholder="Enter URL:">
      <img alt="QR Code" id="qrimg" src="download.png">
      <button 
      onclick="document.getElementById('qrimg').src='https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=' + document.getElementById('qr').value">
        Generate QR
      </button>
    </div>
</body>
</html>
